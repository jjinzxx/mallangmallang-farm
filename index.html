<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말랑말랑목장</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">🐴 말랑말랑<span>목장</span></div>
    <div class="res">
      <div class="chip">🪙 <span id="rCoins">0</span></div>
      <div class="chip">🥕 <span id="rCarrots">0</span></div>
      <div class="chip">🏆 <span id="rTrophies">0</span></div>
      <div class="chip" id="rUser" style="cursor:pointer;">👤 …</div>
    </div>
  </div>
  <div id="tabs">
    <div class="tab" data-tab="race">🏁 경주</div>
    <div class="tab on" data-tab="ranch">🏠 목장</div>
    <div class="tab" data-tab="breed">💕 교배</div>
    <div class="tab" data-tab="train">💪 훈련</div>
  </div>
  <div id="view" class="panel"></div>
</div>

<div id="modalBg"><div id="modal"></div></div>
<div id="toasts"></div>

<div id="authBg">
  <div id="authBox">
    <div style="font-size:22px;">🐴 말랑말랑<span style="color:var(--pink);">목장</span></div>
    <div class="hint" style="margin-bottom:6px;">로그인하면 어느 기기에서든 같은 목장을 이어서 할 수 있어요</div>
    <input class="in" id="authEmail" type="email" placeholder="이메일" autocomplete="email">
    <input class="in" id="authPw" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
    <div id="authMsg"></div>
    <button class="px pink" id="btnLogin">로그인</button>
    <button class="px" id="btnSignup">회원가입</button>
    <button class="px small" id="btnGuest" style="background:#cfc4ab;">게스트로 플레이 (이 기기에만 저장)</button>
  </div>
</div>

<button id="chatFab" title="목장 광장 채팅">💬</button>
<div id="chatPanel">
  <div id="chatHead"><span>💬 목장 광장</span><span id="chatClose">✕</span></div>
  <div id="chatMsgs"></div>
  <div id="chatInputRow">
    <input class="in" id="chatInput" maxlength="200" placeholder="메시지 입력…">
    <button class="px small pink" id="chatSend">전송</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="game.js"></script>
</body>
</html>
